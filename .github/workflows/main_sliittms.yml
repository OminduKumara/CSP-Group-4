name: Monorepo CI/CD

on:
  push:
    branches: [ "develop", "test", "main" ]
  pull_request:
    branches: [ "develop", "test", "main" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Forces the runner to use stable .NET 8

      - name: Restore & Build Backend
        # Points to your solution inside the server/tmsserver folder
        run: |
          dotnet restore server/tmsserver/CSP-Group-4.sln
          dotnet build server/tmsserver/CSP-Group-4.sln --configuration Release

      - name: Run Unit Tests
        # We use the built-in "html" friendly name
        run: dotnet test tests/UnitTests/UnitTests.csproj --configuration Release --logger "html;LogFileName=TestReport.html"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Viva-QA-Report
          # .NET usually places the HTML file in a timestamped folder inside TestResults
          # Using ** helps the runner find it regardless of the folder name
          path: tests/UnitTests/TestResults/**/*.html

      - name: Run UI Tests
        # We add the HTML logger here as well
        run: dotnet test tests/UITests/UITests.csproj --configuration Release --logger "html;LogFileName=UI_TestReport.html"

      - name: Upload UI Test Results
        if: always() # Ensures you get the report even if the UI test fails
        uses: actions/upload-artifact@v4
        with:
          name: Viva-UI-QA-Report
          path: tests/UITests/TestResults/UI_TestReport.html
