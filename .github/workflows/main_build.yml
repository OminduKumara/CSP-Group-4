name: Monorepo CI/CD

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build Backend
        # Corrected: Using the .sln in the root
        run: |
          dotnet restore CSP-Group-4.sln
          dotnet build CSP-Group-4.sln --configuration Release

      - name: Run Unit Tests
        # Corrected: Path to your UnitTests project based on your image
        run: dotnet test tests/UnitTests/UnitTests.csproj --configuration Release

      - name: Build Backend Docker Image
        # Corrected: Build context is the server/tmsserver folder where your Dockerfile sits
        run: |
          docker build -t tmsserver:develop ./server/tmsserver