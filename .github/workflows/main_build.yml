name: Monorepo CI/CD

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        # Using **/*.sln tells GitHub to find the solution file anywhere in the repo
        run: dotnet restore **/*.sln

      - name: Build
        run: dotnet build **/*.sln --configuration Release --no-restore

      - name: Run Unit Tests
        # This finds your UnitTests.csproj regardless of the exact folder path
        run: dotnet test tests/UnitTests/*.csproj --configuration Release --no-build

      - name: Build Backend Docker Image
        # Using the exact path from your screenshot
        run: |
          cd server/tmsserver
          docker build -t tmsserver:develop .