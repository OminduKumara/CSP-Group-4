name: Monorepo CI/CD

on:
  push:
    branches: [ "develop", "test" ]
  pull_request:
    branches: [ "develop", "test" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build Backend
        # Path updated to your new .sln location
        run: |
          dotnet restore server/tmsserver/CSP-Group-4.sln
          dotnet build server/tmsserver/CSP-Group-4.sln --configuration Release

      - name: Run Unit Tests
        # The test runner still looks at the root level 'tests' folder
        run: dotnet test tests/UnitTests/UnitTests.csproj --configuration Release

      - name: Build Backend Docker Image
        run: |
          docker build -t tmsserver:develop ./server/tmsserver