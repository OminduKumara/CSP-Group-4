name: Monorepo CI/CD

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build Backend
        run: |
          dotnet restore backend/*.sln
          dotnet build backend/*.sln --configuration Release

      - name: Run Unit Tests
        run: dotnet test tests/UnitTests/*.csproj --configuration Release

      - name: Build Backend Docker Image
        run: |
          docker build -t my-backend:develop ./backend