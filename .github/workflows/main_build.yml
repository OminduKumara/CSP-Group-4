name: Monorepo CI/CD

on:
  push:
    branches: [ "develop", "test" ]
  pull_request:
    branches: [ "develop", "test" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Forces the runner to use stable .NET 8

      - name: Restore & Build Backend
        # Points to your solution inside the server/tmsserver folder
        run: |
          dotnet restore server/tmsserver/CSP-Group-4.sln
          dotnet build server/tmsserver/CSP-Group-4.sln --configuration Release

      - name: Run Unit Tests
        # Runs the specific NUnit project you initialized
        run: dotnet test tests/UnitTests/UnitTests.csproj --configuration Release