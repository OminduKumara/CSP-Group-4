name: Monorepo CI/CD

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build Backend
        # Correctly points to the .sln in your root folder
        run: |
          dotnet restore CSP-Group-4.sln
          dotnet build CSP-Group-4.sln --configuration Release

      - name: Run Unit Tests
        # Correctly points to your UnitTests project path
        run: dotnet test tests/UnitTests/UnitTests.csproj --configuration Release

      - name: Build Backend Docker Image
        # 'server/tmsserver' is where your Dockerfile and code reside
        run: |
          docker build -t tmsserver:develop ./server/tmsserver